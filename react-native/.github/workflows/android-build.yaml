name: Build Android APK/AAB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        type: choice
        options:
          - apk
          - appbundle

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Expo CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: |
          cd react-native
          npm ci

      - name: Cache Expo dependencies
        uses: actions/cache@v4
        with:
          path: |
            react-native/node_modules
            react-native/app/build
          key: ${{ runner.os }}-expo-${{ hashFiles('react-native/package-lock.json') }}

      - name: Build Android
        run: |
          cd react-native

          # Build APK
          if [ "${{ github.event.inputs.buildType }}" = "apk" ] || [ "${{ github.ref_name }}" = "v*" ]; then
            npx expo export:android --output app/build/apk
          else
            npx expo export:android --output app/build/appbundle
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: github.event.inputs.buildType == 'apk' || github.ref_name == 'v*'
        with:
          name: pitch-counter-apk-${{ github.ref_name }}
          path: react-native/app/build/apk/

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        if: github.event.inputs.buildType == 'appbundle'
        with:
          name: pitch-counter-appbundle-${{ github.ref_name }}
          path: react-native/app/build/appbundle/

      - name: Sign and Upload to Play Store
        if: github.event.inputs.buildType == 'appbundle' || github.ref_name == 'v*'
        uses: r0adkll/upload-google-play@v0.4.0
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: dev.defektive.pitch
          releaseFiles: app/build/appbundle/*
          track: internal
