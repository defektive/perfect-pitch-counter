name: Deploy React Native to Play Store

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_deploy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set Up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set Up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-native/package-lock.json

      - name: Install Dependencies
        working-directory: react-native
        run: npm ci

      - name: Run Tests
        working-directory: react-native
        run: npm test -- --run

      - name: Generate Android Project
        working-directory: react-native
        run: npx expo prebuild --platform android --clean

      - name: Remove unsupported enableBundleCompression
        working-directory: react-native
        run: sed -i '/enableBundleCompression/d' android/app/build.gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/upload.keystore"

      - name: Build Release AAB
        working-directory: react-native
        run: |
          ./android/gradlew -p ./android bundleRelease \
            -Pandroid.injected.versionCode=${{ github.run_number }} \
            -Pandroid.injected.versionName=${{ github.ref_name }} \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/upload.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload to Google Play Store
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: dev.defektive.pitchin
          releaseFiles: react-native/android/app/build/outputs/bundle/release/app-release.aab
#          track: internal
#          status: draft
